<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F1317">
<title>IRONLOG</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --bg:#0F1317; --panel:#171D23; --panel2:#1E262E; --line:#2A343E;
  --ink:#E9E5DB; --dim:#7A8794; --amber:#FFB000; --amber-dim:#8a6200;
  --green:#7BC96F; --red:#E4572E;
  --mono:'JetBrains Mono',ui-monospace,'Cascadia Mono',Menlo,monospace;
  --cond:'Barlow Condensed','Arial Narrow',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:14px;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));min-height:100vh}
h1,h2,h3,.big{font-family:var(--cond);letter-spacing:.04em;text-transform:uppercase}
header{padding:14px 16px 8px;display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line)}
header h1{font-size:20px;font-weight:700}
header h1 span{color:var(--amber)}
header .date{color:var(--dim);font-size:11px}
main{padding:14px 14px 24px;max-width:560px;margin:0 auto}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
.card h2{font-size:13px;color:var(--dim);font-weight:600;margin-bottom:8px;letter-spacing:.12em}
.readout{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:10px;padding:16px;margin-bottom:12px}
.readout .code{font-family:var(--cond);font-size:52px;font-weight:700;line-height:1;color:var(--amber)}
.readout .name{font-family:var(--cond);font-size:20px;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.readout .sub{color:var(--dim);font-size:12px;margin-top:6px}
.queue{display:flex;gap:6px;margin-top:12px}
.queue div{flex:1;text-align:center;padding:5px 0;border:1px solid var(--line);border-radius:6px;color:var(--dim);font-size:11px}
.queue .on{border-color:var(--amber);color:var(--amber)}
.row{display:flex;gap:8px}
.row>*{flex:1}
button{font-family:var(--mono);font-size:14px;background:var(--panel2);color:var(--ink);
  border:1px solid var(--line);border-radius:8px;padding:12px;cursor:pointer;width:100%}
button.primary{background:var(--amber);color:#181104;border-color:var(--amber);font-weight:700}
button.ghost{background:transparent}
button.small{padding:7px 10px;font-size:12px;width:auto}
button:active{transform:translateY(1px)}
input,select{font-family:var(--mono);font-size:16px;background:var(--bg);color:var(--ink);
  border:1px solid var(--line);border-radius:8px;padding:10px;width:100%}
input:focus{outline:2px solid var(--amber-dim)}
label{font-size:11px;color:var(--dim);display:block;margin:8px 0 4px;text-transform:uppercase;letter-spacing:.08em}
.restbar{position:sticky;top:0;z-index:5;background:var(--panel2);border:1px solid var(--line);
  border-left:3px solid var(--amber);color:var(--amber);font-family:var(--cond);font-size:24px;
  font-weight:700;letter-spacing:.08em;padding:10px 14px;border-radius:10px;margin-bottom:10px;text-align:center}
.restbar.go{color:var(--green);border-left-color:var(--green)}
.vbar{height:4px;background:var(--line);border-radius:2px;margin:-2px 0 8px}
.vbar div{height:100%;border-radius:2px}
.stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px}
.stat:last-child{border-bottom:none}
.stat b{color:var(--amber)}
.stat .ok{color:var(--green)}
.ex{border:1px solid var(--line);border-radius:8px;margin-bottom:10px;overflow:hidden}
.ex-head{background:var(--panel2);padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.ex-head .nm{font-family:var(--cond);font-size:17px;text-transform:uppercase;letter-spacing:.04em}
.ex-head .tg{font-size:11px;color:var(--dim)}
.set{display:grid;grid-template-columns:34px 1fr 1fr 44px;gap:8px;align-items:center;padding:8px 12px;border-top:1px solid var(--line)}
.set .n{color:var(--dim);font-size:12px}
.set input{padding:8px;text-align:center}
.set .done-btn{width:44px;height:40px;padding:0;font-size:16px}
.set.done .done-btn{background:var(--amber);color:#181104;border-color:var(--amber)}
nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--panel);
  border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
nav button{border:none;border-radius:0;background:none;color:var(--dim);font-size:11px;padding:10px 0;
  text-transform:uppercase;letter-spacing:.06em}
nav button.on{color:var(--amber)}
.spark{width:100%;height:64px;margin-top:6px}
.hist{padding:9px 0;border-bottom:1px dashed var(--line);font-size:12px}
.hist b{font-family:var(--cond);font-size:15px;color:var(--amber);text-transform:uppercase;margin-right:8px}
.hist .d{color:var(--dim)}
.note{color:var(--dim);font-size:12px;line-height:1.5;margin-top:8px}
.pill{display:inline-block;border:1px solid var(--line);border-radius:99px;padding:2px 9px;font-size:11px;color:var(--dim);margin:2px 3px 2px 0}
.up{color:var(--green)} .dn{color:var(--red)}
.hide{display:none}
textarea{width:100%;height:90px;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:8px;font-family:var(--mono);font-size:11px;padding:8px}
</style>
</head>
<body>
<header><h1>IRON<span>LOG</span></h1><div class="date" id="hdrDate"></div></header>
<main id="main"></main>
<nav>
  <button data-v="home" class="on">Train</button>
  <button data-v="log">Log</button>
  <button data-v="hist">History</button>
  <button data-v="set">Setup</button>
</nav>
<script>
/* ============ PROGRAM ============ */
const PROGRAM = [
 {code:"UA", name:"Upper A · Horizontal", ex:[
  {id:"benchT", nm:"Bench Press · Top Set",   sets:1, lo:3,  hi:5,  inc:2.5, w:70},
  {id:"bench",  nm:"Bench Press · Back-offs", sets:3, lo:6,  hi:8,  inc:2.5, w:60},
  {id:"csrow",  nm:"Chest-Supported Row",     sets:4, lo:8,  hi:12, inc:2.5, w:40},
  {id:"incdb",  nm:"Incline DB Press",        sets:3, lo:8,  hi:12, inc:2.0, w:24},
  {id:"pdown",  nm:"Lat Pulldown",            sets:3, lo:10, hi:12, inc:2.5, w:55},
  {id:"latr",   nm:"Cable Lateral Raise",     sets:3, lo:12, hi:20, inc:1.0, w:7.5},
  {id:"ezcurl", nm:"EZ-Bar Curl",             sets:3, lo:8,  hi:12, inc:2.5, w:25},
  {id:"tripd",  nm:"Triceps Pushdown",        sets:3, lo:10, hi:15, inc:2.5, w:25}]},
 {code:"LA", name:"Lower A · Squat", ex:[
  {id:"squatT", nm:"Back Squat · Top Set",    sets:1, lo:3,  hi:5,  inc:2.5, w:90},
  {id:"squat",  nm:"Back Squat · Back-offs",  sets:3, lo:6,  hi:8,  inc:2.5, w:80},
  {id:"rdl",    nm:"Romanian Deadlift",       sets:3, lo:8,  hi:10, inc:2.5, w:70},
  {id:"lpress", nm:"Leg Press",               sets:3, lo:10, hi:12, inc:5.0, w:120},
  {id:"lcurl",  nm:"Lying Leg Curl",          sets:3, lo:10, hi:15, inc:2.5, w:35},
  {id:"calf",   nm:"Standing Calf Raise",     sets:4, lo:10, hi:15, inc:5.0, w:60},
  {id:"hlr",    nm:"Hanging Leg Raise",       sets:3, lo:10, hi:15, inc:0,   w:0}]},
 {code:"UB", name:"Upper B · Vertical", ex:[
  {id:"ohpT",   nm:"Overhead Press · Top Set",sets:1, lo:3,  hi:5,  inc:2.5, w:45},
  {id:"ohp",    nm:"Overhead Press · Back-offs",sets:3,lo:6,  hi:8,  inc:2.5, w:40},
  {id:"pullup", nm:"Weighted Pull-Up",        sets:4, lo:6,  hi:10, inc:2.5, w:0},
  {id:"crow",   nm:"Seated Cable Row",        sets:3, lo:10, hi:12, inc:2.5, w:55},
  {id:"dips",   nm:"Weighted Dips",           sets:3, lo:8,  hi:12, inc:2.5, w:0},
  {id:"shrug",  nm:"DB Shrug",                sets:3, lo:10, hi:15, inc:2.5, w:30},
  {id:"rdelt",  nm:"Rear Delt Fly",           sets:3, lo:15, hi:20, inc:1.0, w:8},
  {id:"hcurl",  nm:"Hammer Curl",             sets:3, lo:10, hi:12, inc:2.0, w:14},
  {id:"ohtri",  nm:"Overhead Triceps Ext",    sets:3, lo:10, hi:15, inc:2.5, w:20}]},
 {code:"LB", name:"Lower B · Hinge", ex:[
  {id:"dl",     nm:"Deadlift",                sets:3, lo:3,  hi:6,  inc:5.0, w:100},
  {id:"hack",   nm:"Hack Squat / Front Squat",sets:3, lo:6,  hi:10, inc:2.5, w:60},
  {id:"lunge",  nm:"Walking Lunge (per leg)", sets:3, lo:10, hi:12, inc:2.0, w:16},
  {id:"scurl",  nm:"Seated Leg Curl",         sets:3, lo:12, hi:15, inc:2.5, w:40},
  {id:"calf2",  nm:"Seated Calf Raise",       sets:4, lo:12, hi:20, inc:5.0, w:40},
  {id:"cablecr",nm:"Cable Crunch",            sets:3, lo:10, hi:15, inc:2.5, w:30}]},
 {code:"PC", name:"Pump + Conditioning (optional)", ex:[
  {id:"latr2",  nm:"DB Lateral Raise",        sets:4, lo:12, hi:20, inc:1.0, w:8},
  {id:"curl2",  nm:"Incline DB Curl",         sets:3, lo:10, hi:15, inc:1.0, w:10},
  {id:"tri2",   nm:"Rope Pushdown",           sets:3, lo:12, hi:20, inc:2.5, w:20},
  {id:"neckrow",nm:"Face Pull",               sets:3, lo:15, hi:20, inc:2.5, w:20},
  {id:"shrug2", nm:"Cable Shrug",             sets:3, lo:12, hi:15, inc:2.5, w:40},
  {id:"z2",     nm:"Incline Treadmill Z2 (min)",sets:1,lo:25, hi:35, inc:0,  w:0}]}
];
/* ============ STATE ============ */
const KEY="ironlog_v1";
let S = JSON.parse(localStorage.getItem(KEY)||"null") || {
  q:0, prog:{}, sessions:[], weights:[], food:{}, sleep:[], bw:85, phase:"cut", active:null
};
const save=()=>localStorage.setItem(KEY,JSON.stringify(S));
const today=()=>new Date().toISOString().slice(0,10);
const P=(exId)=>{ if(!S.prog[exId]){const e=allEx()[exId];S.prog[exId]={w:e.w,fail:0}} return S.prog[exId]; };
function allEx(){const m={};PROGRAM.forEach(s=>s.ex.forEach(e=>m[e.id]=e));return m;}
/* adaptive calorie target: bodyweight trend is the feedback signal (no food logging) */
function bw(){return S.weights.length?S.weights[S.weights.length-1].kg:S.bw;}
function protTarget(){return Math.round(bw()*2.2);}
function weekRate(){if(S.weights.length<10)return null;
  const w=S.weights.map(x=>x.kg);return +(avg(w.slice(-7))-avg(w.slice(-14,-7))).toFixed(2);}
function calTarget(){const base=Math.round(bw()*31*(S.phase==="gain"?1.07:0.85)/10)*10;
  const goal=S.phase==="gain"?0.2:-0.3,r=weekRate();
  if(r===null)return{kcal:base,adj:0,rate:null,goal};
  /* 7700 kcal per kg of tissue: convert the weekly trend error into a daily kcal correction */
  const adj=Math.max(-400,Math.min(400,Math.round((goal-r)*7700/7/10)*10));
  return{kcal:base+adj,adj,rate:r,goal};}
/* ============ RENDER ============ */
const main=document.getElementById("main");
document.getElementById("hdrDate").textContent=new Date().toDateString();
let view="home";
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{view=b.dataset.v;detailEx=null;
  document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("on",x===b));render();});
function render(){ if(S.active) return renderSession();
  if(view==="hist"&&detailEx) return renderExDetail();
  ({home:renderHome,log:renderLog,hist:renderHist,set:renderSet})[view](); }

function renderHome(){
  const s=PROGRAM[S.q], t=calTarget();
  const last=S.sessions[S.sessions.length-1];
  main.innerHTML=`
  <div class="readout">
    <div class="code">${s.code}</div>
    <div class="name">${s.name}</div>
    <div class="sub">${s.ex.length} exercises · double progression · ${last?("last session "+last.d):"no sessions yet"}</div>
    <div class="queue">${PROGRAM.map((p,i)=>`<div class="${i===S.q?'on':''}">${p.code}</div>`).join("")}</div>
    <div class="row" style="margin-top:12px">
      <button class="primary" onclick="startSession()">Start session</button>
      <button class="ghost" onclick="skip()">Skip →</button>
    </div>
  </div>
  <div class="card"><h2>Fuel · ${S.phase==="gain"?"Lean gain":"Cut"} phase</h2>
    <div class="stat"><span>Calorie target</span><span><b>${t.kcal}</b> kcal/day</span></div>
    <div class="stat"><span>Protein floor</span><span><b>${protTarget()}</b> g/day</span></div>
    <div class="stat"><span>Bodyweight</span><span><b>${bw().toFixed(1)}</b> kg</span></div>
    <div class="note">${t.rate===null
      ?`Baseline ${S.phase==="gain"?"31×BW +7%":"31×BW −15%"}. Log bodyweight daily — after ~2 weeks the target auto-adjusts from your actual weight trend, no food logging needed.`
      :`Trend ${t.rate>0?"+":""}${t.rate} kg/wk vs goal ${t.goal>0?"+":""}${t.goal}. ${t.adj===0?"On track — target unchanged.":`Target ${t.adj>0?"raised":"cut"} ${Math.abs(t.adj)} kcal/day to steer you back to ${t.goal>0?"+":""}${t.goal} kg/wk.`}`}</div>
  </div>
  <div class="card"><h2>Rules of the machine</h2>
    <div class="note">Hit the top of every rep range → weight goes up next time, automatically. Miss the bottom 3 sessions in a row → auto-deload 10%. Rest 2–3 min on compounds, 1–2 min elsewhere. PC day is optional: do it when fresh, skip it when not. Never think, just show up.</div>
  </div>`;
}
function skip(){S.q=(S.q+1)%PROGRAM.length;save();render();}
function startSession(){
  const s=PROGRAM[S.q];
  S.active={code:s.code,d:today(),ex:s.ex.map(e=>({id:e.id,sets:Array.from({length:e.sets},()=>({w:P(e.id).w,r:"",ok:false}))}))};
  save();render();
}
function renderSession(){
  const A=S.active, s=PROGRAM.find(p=>p.code===A.code), M=allEx();
  main.innerHTML=`<div id="restbar" class="restbar" style="display:none"></div>
  <div class="readout"><div class="code">${A.code}</div><div class="name">${s.name}</div>
  <div class="sub">Tap ✓ per set. Weights prefilled from progression engine.</div></div>`+
  A.ex.map((ax,xi)=>{const e=M[ax.id];return `<div class="ex">
    <div class="ex-head"><span class="nm">${e.nm}</span><span class="tg">${e.sets}×${e.lo}–${e.hi}${e.inc?` · +${e.inc}kg`:``}</span></div>
    ${ax.sets.map((st,si)=>`<div class="set ${st.ok?'done':''}">
      <span class="n">S${si+1}</span>
      <input type="number" inputmode="decimal" value="${st.w}" placeholder="kg" onchange="upd(${xi},${si},'w',this.value)">
      <input type="number" inputmode="numeric" value="${st.r}" placeholder="reps ${e.lo}–${e.hi}" onchange="upd(${xi},${si},'r',this.value)">
      <button class="done-btn" onclick="tick(${xi},${si})">✓</button></div>`).join("")}
  </div>`}).join("")+
  `<div class="row"><button class="primary" onclick="finish()">Finish session</button>
   <button class="ghost" onclick="if(confirm('Discard session?')){S.active=null;save();render()}">Discard</button></div>`;
}
function upd(xi,si,k,v){S.active.ex[xi].sets[si][k]=parseFloat(v)||0;save();}
function tick(xi,si){const st=S.active.ex[xi].sets[si];st.ok=!st.ok;
  if(st.ok&&!st.r){const e=allEx()[S.active.ex[xi].id];st.r=e.hi;}
  if(st.ok)startRest(restFor(S.active.ex[xi].id));
  save();render();}
/* rest timer: heavier rep ranges earn longer rest */
let restEnd=0,restIv=0,buzzed=false;
function restFor(id){const e=allEx()[id];return e.lo<=6?180:e.lo<=8?150:90;}
function startRest(sec){restEnd=Date.now()+sec*1000;buzzed=false;
  if(restIv)return;
  restIv=setInterval(()=>{const el=document.getElementById("restbar");
    if(!el){clearInterval(restIv);restIv=0;return;}
    const s=Math.ceil((restEnd-Date.now())/1000);
    if(s>0){el.style.display="block";el.classList.remove("go");
      el.textContent="REST "+Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
    else{el.style.display="block";el.classList.add("go");el.textContent="GO — NEXT SET";
      if(!buzzed){buzzed=true;if(navigator.vibrate)navigator.vibrate([200,100,200]);}
      if(s<=-20){el.style.display="none";clearInterval(restIv);restIv=0;}}},250);}
function finish(){
  const A=S.active,M=allEx();
  /* PR check against history before this session is pushed */
  const prs=[];
  A.ex.forEach(ax=>{const done=ax.sets.filter(s=>s.ok);if(!done.length)return;
    let hw=0,he=0,seen=false;
    S.sessions.forEach(s=>{const px=s.ex.find(x=>x.id===ax.id);if(!px)return;
      const d2=px.sets.filter(x=>x.ok);if(!d2.length)return;seen=true;
      hw=Math.max(hw,...d2.map(x=>+x.w||0));he=Math.max(he,...d2.map(x=>e1rm(+x.w||0,+x.r||0)));});
    if(!seen)return;
    const w=Math.max(...done.map(s=>+s.w||0)),e2=Math.max(...done.map(s=>e1rm(+s.w||0,+s.r||0)));
    const nm=M[ax.id]?M[ax.id].nm:ax.id;
    if(w>hw)prs.push(`${nm} — ${w} kg (was ${hw})`);
    else if(e2>he)prs.push(`${nm} — e1RM ${e2} kg (was ${he})`);});
  A.ex.forEach(ax=>{const e=M[ax.id],p=P(ax.id);const done=ax.sets.filter(s=>s.ok);
    if(!done.length)return;
    p.w=Math.max(...done.map(s=>+s.w||0)); /* adopt the weight actually lifted as the new baseline */
    const allTop=done.length>=e.sets&&done.every(s=>s.r>=e.hi);
    const allBottom=done.every(s=>s.r>=e.lo);
    if(allTop&&e.inc){p.w=+(p.w+e.inc).toFixed(2);p.fail=0;}
    else if(allBottom){p.fail=0;}
    else{p.fail++;if(p.fail>=3){p.w=Math.max(0,Math.round(p.w*0.9/2.5)*2.5);p.fail=0;}}});
  S.sessions.push({code:A.code,d:A.d,ex:A.ex});
  S.q=(S.q+1)%PROGRAM.length; S.active=null; save();
  if(prs.length){if(navigator.vibrate)navigator.vibrate([100,50,100,50,300]);
    alert("🏆 NEW PR\n\n"+prs.join("\n"));}
  view="home";render();
}
/* ============ LOG ============ */
function renderLog(){
  const sl=S.sleep.filter(x=>x.d>=addDays(-7)).reduce((a,x)=>a+x.h,0)/Math.max(1,S.sleep.filter(x=>x.d>=addDays(-7)).length);
  main.innerHTML=`
  <div class="card"><h2>Bodyweight</h2>
    <div class="row"><input id="bwIn" type="number" inputmode="decimal" step="0.1" placeholder="${bw().toFixed(1)} kg">
    <button class="small primary" onclick="addBW()">Save</button></div>
    ${spark(S.weights.slice(-30).map(w=>w.kg))}
    <div class="note">${trendNote()} Your daily weigh-in is what steers the calorie target on Home.</div></div>
  <div class="card"><h2>Sleep · 7d avg ${sl?sl.toFixed(1):"–"} h</h2>
    <div class="row"><input id="slIn" type="number" inputmode="decimal" step="0.1" placeholder="hours last night">
    <button class="small primary" onclick="addSleep()">Save</button></div>
    <label>Import Sleep Cycle export (sleepdata.csv)</label>
    <input type="file" accept=".csv" onchange="importSC(this)">
    <div class="note">Sleep Cycle → Settings → Download data. Drop the CSV here; nights merge automatically.</div></div>`;
}
const addDays=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
function addBW(){const v=parseFloat(document.getElementById("bwIn").value);if(!v)return;
  S.weights=S.weights.filter(w=>w.d!==today());S.weights.push({d:today(),kg:v});save();render();}
function addSleep(){const v=parseFloat(document.getElementById("slIn").value);if(!v)return;
  S.sleep=S.sleep.filter(x=>x.d!==today());S.sleep.push({d:today(),h:v});save();render();}
function importSC(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{const lines=r.result.split("\n");const head=lines[0].split(";");
    const iS=head.findIndex(h=>/start/i.test(h)),iE=head.findIndex(h=>/end/i.test(h));
    let n=0;lines.slice(1).forEach(L=>{const c=L.split(";");if(c.length<3)return;
      const a=new Date(c[iS]),b=new Date(c[iE]);if(isNaN(a)||isNaN(b))return;
      const d=b.toISOString().slice(0,10),h=+(((b-a)/36e5).toFixed(1));
      S.sleep=S.sleep.filter(x=>x.d!==d);S.sleep.push({d,h});n++;});
    S.sleep.sort((a,b)=>a.d<b.d?-1:1);save();alert(n+" nights imported");render();};
  r.readAsText(f);}
function trendNote(){if(S.weights.length<8)return "Log daily; 7-day averages beat single weigh-ins.";
  const w=S.weights.map(x=>x.kg),a=avg(w.slice(-7)),b=avg(w.slice(-14,-7));const d=a-b;
  const dir=d>0.15?`<span class="up">+${d.toFixed(2)}</span>`:d<-0.15?`<span class="dn">${d.toFixed(2)}</span>`:"flat";
  return `7-day avg vs prior week: ${dir} kg/wk. Recomp sweet spot: −0.1 to −0.3 kg/wk while lifts climb.`;}
const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
function spark(vals){if(vals.length<2)return "";const min=Math.min(...vals),max=Math.max(...vals),r=max-min||1;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*100).toFixed(1)},${(60-(v-min)/r*52-4).toFixed(1)}`).join(" ");
  return `<svg class="spark" viewBox="0 0 100 64" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="#FFB000" stroke-width="1.5"/></svg>`;}
/* ============ HISTORY ============ */
let detailEx=null;
function showEx(id){detailEx=id;render();}
const e1rm=(w,r)=>!w||!r?0:+(r<=1?w:w*(1+r/30)).toFixed(1); /* Epley */
function exPoints(id){const pts=[];S.sessions.forEach(s=>{const ax=s.ex.find(e=>e.id===id);if(!ax)return;
  const done=ax.sets.filter(x=>x.ok);if(!done.length)return;
  pts.push({d:s.d,w:Math.max(...done.map(x=>+x.w||0)),e:Math.max(...done.map(x=>e1rm(+x.w||0,+x.r||0)))});});
  let mx=0;pts.forEach((p,i)=>{p.pr=i>0&&p.e>mx;mx=Math.max(mx,p.e);});
  return pts;}
function exChart(pts){
  if(pts.length<2)return '<div class="note">Log this exercise in at least two sessions to see a trend.</div>';
  const W=320,H=150,padL=34,padR=10,padT=12,padB=18;
  const vals=pts.flatMap(p=>[p.w,p.e]);let lo=Math.min(...vals),hi=Math.max(...vals);
  if(hi-lo<1){hi+=2.5;lo=Math.max(0,lo-2.5);}
  const X=i=>padL+(W-padL-padR)*i/(pts.length-1), Y=v=>padT+(H-padT-padB)*(1-(v-lo)/(hi-lo));
  const line=k=>pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p[k]).toFixed(1)}`).join(" ");
  const grid=[0,.5,1].map(f=>{const v=lo+(hi-lo)*f,y=Y(v).toFixed(1);
    return `<line x1="${padL}" x2="${W-padR}" y1="${y}" y2="${y}" stroke="#2A343E"/><text x="${padL-4}" y="${+y+3}" text-anchor="end" font-size="8" fill="#7A8794">${Math.round(v)}</text>`}).join("");
  const dots=(k,c)=>pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p[k]).toFixed(1)}" r="3" fill="${c}" stroke="#171D23" stroke-width="1.5"/>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${grid}
    <polyline points="${line('e')}" fill="none" stroke="#7BC96F" stroke-width="2" stroke-dasharray="5 4" opacity=".9"/>
    <polyline points="${line('w')}" fill="none" stroke="#FFB000" stroke-width="2"/>
    ${pts.map((p,i)=>p.pr?`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.e).toFixed(1)}" r="6.5" fill="none" stroke="#FFB000" stroke-width="1.5"/>`:"").join("")}
    ${dots('e','#7BC96F')}${dots('w','#FFB000')}
    <text x="${padL}" y="${H-4}" font-size="8" fill="#7A8794">${pts[0].d}</text>
    <text x="${W-padR}" y="${H-4}" text-anchor="end" font-size="8" fill="#7A8794">${pts[pts.length-1].d}</text></svg>`;
}
function renderExDetail(){
  const M=allEx(),e=M[detailEx],p=P(detailEx),pts=exPoints(detailEx),last=pts[pts.length-1];
  main.innerHTML=`<button class="small" onclick="showEx(null)">← All exercises</button>
  <div class="readout" style="margin-top:10px"><div class="name">${e?e.nm:detailEx}</div>
    <div class="code" style="font-size:40px">${p.w} kg</div>
    <div class="sub">next prescription${last?` · last top set ${last.w} kg · est. 1RM ${last.e} kg`:""}</div></div>
  <div class="card"><h2>Timeline</h2>
    <div class="note" style="margin-bottom:6px"><span style="color:#FFB000">━</span> Top set kg&ensp;<span style="color:#7BC96F">╌╌</span> Est. 1RM kg (Epley: w × (1 + reps/30))</div>
    ${exChart(pts)}</div>
  <div class="card"><h2>Sessions (${pts.length})</h2>${
    pts.slice().reverse().map(x=>`<div class="stat"><span>${x.d}</span><span><b>${x.w} kg</b> · e1RM ${x.e} kg${x.pr?' <span style="color:#FFB000">★ PR</span>':""}</span></div>`).join("")||'<div class="note">No completed sets logged yet.</div>'
  }</div>`;
}
const MUSCLE={benchT:{chest:1,triceps:.5},bench:{chest:1,triceps:.5},incdb:{chest:1,triceps:.5},dips:{chest:1,triceps:.5},
 csrow:{back:1,biceps:.5},crow:{back:1,biceps:.5},pdown:{back:1,biceps:.5},pullup:{back:1,biceps:.5},shrug:{back:1},shrug2:{back:1},
 ohpT:{shoulders:1,triceps:.5},ohp:{shoulders:1,triceps:.5},latr:{shoulders:1},latr2:{shoulders:1},rdelt:{shoulders:1},neckrow:{shoulders:1},
 ezcurl:{biceps:1},hcurl:{biceps:1},curl2:{biceps:1},tripd:{triceps:1},ohtri:{triceps:1},tri2:{triceps:1},
 squatT:{quads:1,hams:.5},squat:{quads:1,hams:.5},hack:{quads:1},lpress:{quads:1},lunge:{quads:1,hams:.5},
 rdl:{hams:1},dl:{hams:1,back:.5},lcurl:{hams:1},scurl:{hams:1},calf:{calves:1},calf2:{calves:1},hlr:{abs:1},cablecr:{abs:1}};
function weeklyVolume(){const cut=addDays(-7),tot={};
  S.sessions.filter(s=>s.d>cut).forEach(s=>s.ex.forEach(ax=>{const m=MUSCLE[ax.id];if(!m)return;
    const n=ax.sets.filter(x=>x.ok).length;Object.entries(m).forEach(([g,f])=>tot[g]=(tot[g]||0)+n*f);}));
  return tot;}
function renderHist(){
  const M=allEx(),vol=weeklyVolume();
  const GROUPS=["chest","back","shoulders","biceps","triceps","quads","hams","calves","abs"];
  main.innerHTML=`<div class="card"><h2>Weekly volume · hard sets, last 7 days</h2>${
    GROUPS.map(g=>{const v=+(vol[g]||0).toFixed(1),c=v>16?"#E4572E":v>=10?"#7BC96F":"#7A8794";
      return `<div class="stat"><span style="text-transform:capitalize">${g}</span><span><b style="color:${c}">${v}</b></span></div>
      <div class="vbar"><div style="width:${(Math.min(v,20)/20*100).toFixed(0)}%;background:${c}"></div></div>`}).join("")}
    <div class="note">Zone for the big groups: 10–16 sets/week. Grey = room for more, green = in the zone, red = watch recovery. Compounds credit secondary muscles at half a set.</div></div>
  <div class="card"><h2>Progression state · tap for timeline</h2>${
    Object.entries(S.prog).map(([id,p])=>`<div class="stat" style="cursor:pointer" onclick="showEx('${id}')"><span>${M[id]?M[id].nm:id}</span><span><b>${p.w} kg</b>${p.fail?` <span class="dn">fail×${p.fail}</span>`:""} <span style="color:#7A8794">›</span></span></div>`).join("")||'<div class="note">Finish your first session to populate.</div>'
  }</div>
  <div class="card"><h2>Sessions (${S.sessions.length})</h2>${
    S.sessions.slice().reverse().slice(0,30).map(s=>`<div class="hist"><b>${s.code}</b><span class="d">${s.d}</span> · ${s.ex.reduce((a,e)=>a+e.sets.filter(x=>x.ok).length,0)} sets</div>`).join("")||'<div class="note">Nothing yet. Go lift.</div>'
  }</div>`;
}
/* ============ SETUP ============ */
function renderSet(){
  main.innerHTML=`
  <div class="card"><h2>Data</h2>
    <div class="row"><button onclick="expData()">Export JSON</button><button onclick="document.getElementById('imp').click()">Import JSON</button></div>
    <input id="imp" type="file" accept=".json" class="hide" onchange="impData(this)">
    <div class="note">All data lives on this device only (localStorage). Export regularly and stash the JSON wherever you like; nothing ever leaves your phone.</div></div>
  <div class="card"><h2>Phase</h2>
    <div class="row"><button class="${S.phase==='cut'?'primary':''}" onclick="S.phase='cut';save();render()">Cut −15%</button>
    <button class="${S.phase==='gain'?'primary':''}" onclick="S.phase='gain';save();render()">Lean gain +7%</button></div>
    <div class="note">Phase 1: cut to ~15% BF (waist ≈ 45–46% of height, so ~83 cm for you). Then switch to lean gain and ride it 6–12 months.</div></div>
  <div class="card"><h2>Starting weights</h2>
    <div class="note">First 2 weeks after a layoff: pick weights you can beat the top of the rep range with. The engine ramps fast; your job is only to not chase your old numbers on day one.</div></div>
  <div class="card"><h2>Reset</h2><button onclick="if(confirm('Wipe everything?')){localStorage.removeItem(KEY);location.reload()}">Factory reset</button></div>`;
}
function expData(){const b=new Blob([JSON.stringify(S,null,1)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="ironlog-"+today()+".json";a.click();}
function impData(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{S=JSON.parse(r.result);save();alert("Imported");render();}catch(e){alert("Invalid file")}};r.readAsText(f);}
/* ============ BOOT ============ */
render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
